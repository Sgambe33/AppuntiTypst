name: Typst CD (Multi-Branch)

on:
  push:
    paths:
      - "**.typ" # Esegue solo se tocchi file Typst
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Compile and Publish
    permissions: write-all
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Typst
      run: |
        wget -q https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz
        tar -xf typst-x86_64-unknown-linux-musl.tar.xz
        sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
        typst --version

    - name: Get Branch Name
      id: branch-name
      # Estrae il nome della branch e sostituisce caratteri non validi per i tag (come /) con -
      run: |
        RAW_BRANCH=${GITHUB_REF#refs/heads/}
        SAFE_BRANCH=$(echo "$RAW_BRANCH" | sed 's|/|-|g')
        echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT
        echo "Current branch is: $RAW_BRANCH (Safe tag: $SAFE_BRANCH)"

    - name: Compile Typst documents
      run: |
        mkdir -p compiled-pdfs
        find . -name "main.typ" -type f | while read -r file; do
          dir_path=$(dirname "$file" | sed 's|^\./||')
          pdf_name=$(echo "$dir_path" | sed 's|/|_|g' | sed 's| |_|g')
          [ -z "$pdf_name" ] || [ "$pdf_name" = "." ] && pdf_name="main"
          
          echo "Compiling $file -> compiled-pdfs/${pdf_name}.pdf"
          typst compile --root . "$file" "compiled-pdfs/${pdf_name}.pdf"
        done

    # CASO 1: Siamo su MAIN -> Release Ufficiale "latest"
    - name: Publish Production Release (Main)
      if: github.ref == 'refs/heads/main'
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        automatic_release_tag: latest
        title: "Official Build"
        prerelease: false
        files: compiled-pdfs/*.pdf

    # CASO 2: Siamo su ALTRE BRANCH -> Release "Preview"
    - name: Publish Preview Release (Branch)
      if: github.ref != 'refs/heads/main'
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        # Il tag sarà dinamico: es. "preview-feature-login"
        automatic_release_tag: "preview-${{ steps.branch-name.outputs.branch }}"
        title: "Preview: ${{ steps.branch-name.outputs.branch }}"
        prerelease: true
        files: compiled-pdfs/*.pdf